services:
  - type: web
    name: moonshot-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: WALLET_PRIVATE_KEY
        sync: false        # you fill this in Render dashboard
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
      - key: DASHBOARD_JSON_PATH
        value: moonshot-bot/data/dashboard.json
    plan: free
